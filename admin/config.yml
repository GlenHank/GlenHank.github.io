backend:
  name: git-gateway
  branch: main

local_backend: true
site_url: https://glenhank.github.io
display_url: https://glenhank.github.io

media_folder: assets/uploads
public_folder: /assets/uploads

commit_messages:
  create: "content: create {{collection}} {{slug}}"
  update: "content: update {{collection}} {{slug}}"
  delete: "content: delete {{collection}} {{slug}}"
  uploadMedia: "content: upload {{path}}"
  deleteMedia: "content: delete {{path}}"
  openAuthoring: "{{message}}"

collections:
  - name: site_content
    label: Site Content
    files:
      - name: blog_posts
        label: Blog Posts
        file: data/posts.json
        format: json
        fields:
          - label: Posts
            name: posts
            widget: list
            summary: "{{fields.date}} - {{fields.title}}"
            minimize_collapsed: true
            fields:
              - { label: ID, name: id, widget: string, hint: "Use lowercase letters, numbers, and hyphens, for example microstructure-as-map." }
              - { label: Title, name: title, widget: string }
              - { label: Tag, name: tag, widget: string, default: Research Notes }
              - { label: Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD }
              - { label: Excerpt, name: excerpt, widget: text }
              - { label: Cover Image, name: image, widget: image, required: false }
              - { label: Body, name: body, widget: markdown }
